provider: external
target: windows

external:
  command: /home/ubuntu/.crabbox/crabbox-win10-qemu-provider.sh
  connection:
    resourceName: "{{leaseIdSlug}}"
    ssh:
      trustProviderOutput: true
      sshConfigProxy: true
      readyCheck: cmd.exe /c echo connected
  config:
    template: win11-arm64
    netDevice: virtio-net-pci
    cpuCount: 4
    memoryMb: 3072

workRoot: C:\crabbox-work

sync:
  gitSeed: false

